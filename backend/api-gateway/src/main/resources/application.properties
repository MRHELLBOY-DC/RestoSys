spring.application.name=api-gateway
server.port=8080

spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

spring.cloud.gateway.server.webflux.discovery.locator.enabled=${GATEWAY_DISCOVERY_LOCATOR_ENABLED:false}
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=${AUTH_SERVICE_URI:http://auth:8000}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/login/**,/api/token/**,/api/register/**,/api/users/**,/api/profile/**,/api/events/**,/api/admin/**,/api/public/restaurantes/**

spring.cloud.gateway.server.webflux.routes[1].id=menu-service
spring.cloud.gateway.server.webflux.routes[1].uri=${MENU_SERVICE_URI:http://menu:8000}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/categories,/api/categories/**,/api/products,/api/products/**,/api/options,/api/options/**,/api/public/products,/api/public/products/**,/api/public/categories,/api/public/categories/**

spring.cloud.gateway.server.webflux.routes[2].id=orders-service
spring.cloud.gateway.server.webflux.routes[2].uri=${ORDERS_SERVICE_URI:http://orders:8002}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/orders,/api/orders/**

spring.cloud.gateway.server.webflux.routes[3].id=payments-billing-service
spring.cloud.gateway.server.webflux.routes[3].uri=${PAYMENTS_SERVICE_URI:http://payments-billing:8003}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/payments,/api/payments/**

spring.cloud.gateway.server.webflux.routes[4].id=reports-service
spring.cloud.gateway.server.webflux.routes[4].uri=${REPORTS_SERVICE_URI:http://reports:8004}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/reports,/api/reports/**


spring.cloud.gateway.server.webflux.routes[5].id=auth-media
spring.cloud.gateway.server.webflux.routes[5].uri=${AUTH_SERVICE_URI:http://auth:8000}
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/auth-media/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=RewritePath=/auth-media/(?<segment>.*), /media/$\{segment}

spring.cloud.gateway.server.webflux.routes[6].id=menu-media
spring.cloud.gateway.server.webflux.routes[6].uri=${MENU_SERVICE_URI:http://menu:8000}
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/menu-media/**
spring.cloud.gateway.server.webflux.routes[6].filters[0]=RewritePath=/menu-media/(?<segment>.*), /media/$\{segment}

spring.cloud.gateway.server.webflux.routes[7].id=orders-websocket
spring.cloud.gateway.server.webflux.routes[7].uri=${ORDERS_SERVICE_URI:http://orders:8002}
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/ws/**

spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_FIRST
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true